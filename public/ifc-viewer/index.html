<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Visor IFC — Infrale 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#050d1a;overflow:hidden;height:100vh;font-family:system-ui,sans-serif;color:#e2e8f0;user-select:none;}

/* ── Layout ── */
#app{display:flex;flex-direction:column;height:100vh;}
#toolbar{display:none;align-items:center;gap:6px;padding:7px 10px;background:#07111f;border-bottom:1px solid #1e3a5f;flex-shrink:0;flex-wrap:wrap;}
#main{display:flex;flex:1;overflow:hidden;}
#sidebar{width:280px;display:none;flex-direction:column;background:#07111f;border-right:1px solid #1e3a5f;flex-shrink:0;overflow:hidden;}
#canvas-wrap{flex:1;position:relative;overflow:hidden;}
canvas{display:block;width:100%!important;height:100%!important;}

/* ── Overlay ── */
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#050d1a;z-index:20;}
.spinner{width:34px;height:34px;border:3px solid #1e3a5f;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#overlay p{font-size:13px;color:#94a3b8;}
.pb{width:200px;height:3px;background:#1e3a5f;border-radius:2px;overflow:hidden;}
.pf{height:100%;background:#2563eb;border-radius:2px;transition:width .4s;}
#err{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#050d1a;padding:24px;text-align:center;z-index:20;}
#err h3{font-size:14px;color:#ef4444;}
#err p{font-size:11px;color:#64748b;max-width:380px;line-height:1.7;}
#err button{background:#1e3a5f;border:1px solid #2563eb44;color:#94a3b8;padding:7px 18px;border-radius:7px;font-size:11px;cursor:pointer;}
#err button:hover{color:#e2e8f0;background:#0f2035;}

/* ── Toolbar buttons ── */
.tb{display:flex;align-items:center;gap:5px;background:rgba(5,13,26,.7);border:1px solid #1e3a5f;color:#94a3b8;padding:5px 9px;border-radius:6px;font-size:11px;cursor:pointer;transition:all .15s;white-space:nowrap;}
.tb:hover{background:#0f2035;color:#e2e8f0;border-color:#2563eb;}
.tb.active{background:#2563eb22;border-color:#2563eb88;color:#60a5fa;}
.tb-sep{width:1px;height:20px;background:#1e3a5f;margin:0 2px;}
#statusbar{margin-left:auto;display:flex;align-items:center;gap:6px;font-size:11px;color:#475569;}
.dot{width:5px;height:5px;border-radius:50%;background:#2563eb;}

/* ── Sidebar tabs ── */
#sidebar-tabs{display:flex;border-bottom:1px solid #1e3a5f;flex-shrink:0;}
.stab{flex:1;padding:8px 4px;text-align:center;font-size:11px;color:#475569;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
.stab.active{color:#60a5fa;border-color:#2563eb;}

/* ── Tree sub-tabs ── */
#tree-subtabs{display:flex;flex-shrink:0;border-bottom:1px solid #0f1f35;}
.tree-stab{flex:1;padding:5px 4px;text-align:center;font-size:10px;color:#475569;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;background:transparent;border-left:none;border-right:none;border-top:none;}
.tree-stab.active{color:#60a5fa;border-color:#2563eb;}
.tree-stab:hover{color:#94a3b8;}

/* ── Search ── */
#search-wrap{padding:6px 8px;border-bottom:1px solid #1e3a5f;flex-shrink:0;position:relative;}
#search-input{width:100%;background:#0a1628;border:1px solid #1e3a5f;border-radius:5px;color:#e2e8f0;font-size:11px;padding:5px 26px 5px 8px;outline:none;transition:border-color .15s;}
#search-input:focus{border-color:#2563eb;}
#search-input::placeholder{color:#334155;}
#search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:#334155;cursor:pointer;font-size:12px;display:none;line-height:1;}

/* ── Sel bar ── */
#sel-bar{display:none;align-items:center;gap:4px;padding:4px 8px;border-bottom:1px solid #1e3a5f;font-size:10px;color:#475569;flex-shrink:0;background:#060f1c;}
#sel-bar span{flex:1;}
#sel-bar button{background:transparent;border:1px solid #1e3a5f;color:#475569;cursor:pointer;font-size:10px;padding:2px 6px;border-radius:3px;}
#sel-bar button:hover{color:#e2e8f0;border-color:#2563eb;}

/* ── Sidebar body ── */
#sidebar-body{flex:1;overflow:hidden;position:relative;}
.spanel{position:absolute;inset:0;overflow-y:auto;display:none;}
.spanel.active{display:block;}
.spanel::-webkit-scrollbar{width:4px;}
.spanel::-webkit-scrollbar-track{background:#07111f;}
.spanel::-webkit-scrollbar-thumb{background:#1e3a5f;border-radius:2px;}

/* ── Tree nodes ── */
/* Storey row */
.storey-row{display:flex;align-items:center;gap:0;padding:5px 6px 5px 4px;cursor:pointer;border-bottom:1px solid #0a1628;}
.storey-row:hover{background:#0a1628;}
.storey-arrow{width:16px;text-align:center;font-size:9px;color:#475569;flex-shrink:0;}
.storey-icon{font-size:11px;margin:0 4px;flex-shrink:0;}
.storey-name{flex:1;font-size:11px;font-weight:600;color:#94a3b8;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.storey-count{font-size:9px;color:#334155;margin-right:4px;}

/* Category row */
.cat-row{display:flex;align-items:center;padding:4px 6px 4px 22px;cursor:pointer;}
.cat-row:hover{background:#080e1c;}
.cat-arrow{width:14px;text-align:center;font-size:9px;color:#334155;flex-shrink:0;}
.cat-icon{font-size:10px;margin:0 3px;flex-shrink:0;}
.cat-name{flex:1;font-size:11px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.cat-count{font-size:9px;color:#1e3a5f;margin-right:4px;}

/* Element row */
.elem-row{display:flex;align-items:center;padding:3px 6px 3px 40px;cursor:pointer;border-radius:0;}
.elem-row:hover{background:#080e1c;}
.elem-row.selected{background:#2563eb18;}
.elem-row.multi-selected{background:#f59e0b18;}
.elem-label{flex:1;font-size:10px;color:#475569;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.elem-row:hover .elem-label,.elem-row.selected .elem-label{color:#94a3b8;}
.elem-row.multi-selected .elem-label{color:#fbbf24;}

/* Eye button — visible on hover or when hidden */
.eye-btn{background:none;border:none;cursor:pointer;color:#334155;font-size:11px;padding:1px 3px;border-radius:3px;flex-shrink:0;opacity:0;transition:opacity .1s, color .1s;line-height:1;}
.storey-row:hover .eye-btn,
.cat-row:hover .eye-btn,
.elem-row:hover .eye-btn,
.eye-btn.is-hidden{opacity:1;}
.eye-btn.is-hidden{color:#1e3a5f;}
.eye-btn:hover{color:#60a5fa!important;opacity:1!important;}

/* children containers */
.storey-children{display:block;}
.storey-children.collapsed{display:none;}
.cat-children{display:block;}
.cat-children.collapsed{display:none;}

/* search highlight */
.elem-label.search-hl{color:#fbbf24!important;}

/* ── Properties ── */
#prop-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:8px;color:#334155;font-size:11px;text-align:center;padding:16px;}
/* Nombre del elemento seleccionado */
#prop-elem-name{padding:8px 10px;font-size:11px;font-weight:600;color:#e2e8f0;border-bottom:1px solid #1e3a5f;background:#060f1c;word-break:break-word;line-height:1.4;}
/* Grupos colapsables (PropertySets) */
.prop-group{border-bottom:1px solid #0a1628;}
.prop-group-header{display:flex;align-items:center;gap:6px;padding:7px 10px;cursor:pointer;background:#0b1a2e;font-size:11px;font-weight:600;color:#7da9d8;transition:background .12s;}
.prop-group-header:hover{background:#0f2035;}
.prop-group-arrow{font-size:9px;color:#334155;flex-shrink:0;width:10px;}
.prop-group-body{display:none;}
.prop-group-body.open{display:block;}
/* Filas clave-valor */
.prop-row{display:flex;padding:4px 10px;gap:8px;border-bottom:1px solid #070f1c;}
.prop-row:nth-child(odd){background:#070d1a;}
.prop-row:nth-child(even){background:#080f1c;}
.prop-key{font-size:10px;color:#475569;flex:0 0 110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.prop-val{font-size:10px;color:#94a3b8;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── Measurement ── */
#measure-tip{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);background:#050d1aee;border:1px solid #2563eb55;border-radius:8px;padding:8px 14px;font-size:12px;color:#60a5fa;pointer-events:none;display:none;white-space:nowrap;}
#crosshair{position:absolute;inset:0;pointer-events:none;display:none;}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:#2563eb88;}
#crosshair::before{width:1px;top:0;bottom:0;left:50%;}
#crosshair::after{height:1px;left:0;right:0;top:50%;}

/* ── Section hint ── */
#section-hint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#050d1acc;border:1px solid #2563eb55;border-radius:8px;padding:10px 16px;font-size:11px;color:#94a3b8;pointer-events:none;display:none;text-align:center;line-height:1.6;}

/* ── Isolate banner ── */
#isolate-banner{position:absolute;top:8px;left:50%;transform:translateX(-50%);background:#f59e0b22;border:1px solid #f59e0b55;border-radius:8px;padding:6px 14px;font-size:11px;color:#fbbf24;pointer-events:none;display:none;white-space:nowrap;z-index:10;}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <button class="tb" id="btn-panel">☰ Panel</button>
    <span class="tb-sep"></span>
    <button class="tb" id="btn-r">⟳ Reset</button>
    <button class="tb" id="btn-w">◻ Wireframe</button>
    <button class="tb" id="btn-fit">⊡ Fit</button>
    <span class="tb-sep"></span>

            Selecciona un elemento<br>para ver sus propiedades

<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/web-ifc@0.0.77/web-ifc-api-iife.js"></script>
<script>
// ═══════════════════════════════════════════════════════
//  OrbitCtrl
// ═══════════════════════════════════════════════════════
class OrbitCtrl {
  constructor(cam,el){
    this.cam=cam;this.el=el;
    this.target=new THREE.Vector3();
    this._r=10;this._phi=Math.PI/4;this._theta=Math.PI/4;
    this._down=false;this._btn=-1;this._px=0;this._py=0;
    this._apply();
    el.addEventListener('mousedown',e=>{this._down=true;this._btn=e.button;this._px=e.clientX;this._py=e.clientY;e.preventDefault();});
    el.addEventListener('mouseup',()=>{this._down=false;});
    el.addEventListener('mouseleave',()=>{this._down=false;});
    el.addEventListener('mousemove',e=>{
      if(!this._down)return;
      const dx=e.clientX-this._px,dy=e.clientY-this._py;
      this._px=e.clientX;this._py=e.clientY;
      if(this._btn===0)this._orbit(dx,dy);else this._pan(dx,dy);
    });
    el.addEventListener('wheel',e=>{this._r=Math.max(0.5,this._r*(1+e.deltaY*0.001));this._apply();e.preventDefault();},{passive:false});
    el.addEventListener('contextmenu',e=>e.preventDefault());
  }
  _orbit(dx,dy){this._theta-=dx*0.006;this._phi=Math.max(0.05,Math.min(Math.PI-0.05,this._phi-dy*0.006));this._apply();}
  _pan(dx,dy){const f=this._r*0.001;const r=new THREE.Vector3().crossVectors(new THREE.Vector3().subVectors(this.cam.position,this.target).normalize(),new THREE.Vector3(0,1,0)).normalize();this.target.addScaledVector(r,-dx*f);this.target.y+=dy*f;this._apply();}
  _apply(){const sp=Math.sin(this._phi),cp=Math.cos(this._phi),st=Math.sin(this._theta),ct=Math.cos(this._theta);this.cam.position.set(this.target.x+this._r*sp*st,this.target.y+this._r*cp,this.target.z+this._r*sp*ct);this.cam.lookAt(this.target);}
  setView(c,d){this.target.copy(c);this._r=d;this._phi=Math.PI/4;this._theta=Math.PI/4;this._apply();}
  update(){}
}

// ═══════════════════════════════════════════════════════
//  Main
// ═══════════════════════════════════════════════════════
(async function(){
  const params  = new URLSearchParams(location.search);
  const fileUrl = params.get('url');
  const modelName=params.get('name')||'Modelo IFC';

  function prog(p,m){document.getElementById('bar').style.width=p+'%';document.getElementById('pct').textContent=p+'%';if(m)document.getElementById('msg').textContent=m;}
  function showErr(t){document.getElementById('overlay').style.display='none';document.getElementById('err').style.display='flex';document.getElementById('errmsg').textContent=t;}

  if(!fileUrl){showErr('No se especificó la URL del modelo.');return;}
  if(typeof THREE==='undefined'){showErr('Three.js no cargó.');return;}
  if(typeof WebIFC==='undefined'){showErr('Motor IFC no cargó.');return;}

  document.getElementById('lbl').textContent=modelName;

  try{
    prog(6,'Iniciando escena 3D...');
    const wrap=document.getElementById('canvas-wrap');
    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0x050d1a);
    const camera=new THREE.PerspectiveCamera(60,wrap.clientWidth/wrap.clientHeight,0.01,100000);
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setPixelRatio(Math.min(devicePixelRatio,2));
    renderer.setSize(wrap.clientWidth,wrap.clientHeight);
    renderer.localClippingEnabled=true;
    wrap.appendChild(renderer.domElement);

    const controls=new OrbitCtrl(camera,renderer.domElement);
    scene.add(new THREE.AmbientLight(0xffffff,0.65));
    const sun=new THREE.DirectionalLight(0xffffff,1.2);
    sun.position.set(50,80,50);scene.add(sun);
    scene.add(new THREE.GridHelper(1000,60,0x1e3a5f,0x0f2035));

    new ResizeObserver(()=>{
      camera.aspect=wrap.clientWidth/wrap.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(wrap.clientWidth,wrap.clientHeight);
    }).observe(wrap);

    let initialCenter=new THREE.Vector3(),initialDist=10;
    (function loop(){requestAnimationFrame(loop);controls.update();renderer.render(scene,camera);})();

    // ── Cargar IFC ─────────────────────────────────────
    prog(16,'Descargando modelo...');
    let res;
    try{res=await fetch(fileUrl);}catch(e){throw new Error('Error de red: '+e.message);}
    if(!res.ok)throw new Error('Error HTTP '+res.status);

    prog(34,'Procesando geometría...');
    const buffer=await res.arrayBuffer();
    let ifcBuffer=buffer.slice(0); // copia independiente para reusar en propiedades

    prog(50,'Inicializando motor IFC...');
    const ifcAPI=new WebIFC.IfcAPI();
    await ifcAPI.Init();
    const modelID=ifcAPI.OpenModel(new Uint8Array(buffer),{COORDINATE_TO_ORIGIN:true,USE_FAST_BOOLS:true});

    // ── Materiales por tipo ─────────────────────────────
    const COLORS={
      // Estructura
      IfcWall:0x4a90d9,IfcWallStandardCase:0x4a90d9,IfcCurtainWall:0x7ec8e3,
      IfcSlab:0x7fb3d3,IfcColumn:0x5b9bd5,IfcBeam:0x6baed6,
      IfcFooting:0x3a6f9f,IfcPile:0x2e5f8a,IfcPlate:0x5589c0,IfcMember:0x4a7db5,
      // Arquitectura
      IfcDoor:0xf59e0b,IfcWindow:0x22d3ee,IfcRoof:0x6366f1,
      IfcStair:0xa78bfa,IfcStairFlight:0xa78bfa,IfcRamp:0x9b7fe8,
      IfcRailing:0x94a3b8,IfcFurnishingElement:0x8b5cf6,IfcFurniture:0x8b5cf6,
      // MEP — rojo/naranja para instalaciones
      IfcFlowSegment:0xe05252,IfcPipeSegment:0xe05252,IfcDuctSegment:0xe8934a,
      IfcCableSegment:0xf0c040,IfcFlowFitting:0xc43e3e,IfcPipeFitting:0xc43e3e,
      IfcDuctFitting:0xd4783a,IfcFlowTerminal:0x52b0e0,IfcAirTerminal:0x52b0e0,
      IfcLamp:0xf0e060,IfcSanitaryTerminal:0x40c0a0,IfcValve:0xb03030,
      IfcDamper:0xc06030,IfcPump:0xd04040,IfcFan:0xd06840,
      IfcBoiler:0xb04040,IfcChiller:0x4080c0,IfcTank:0x608080,
      IfcElectricDistributionBoard:0xd4b000,IfcElectricAppliance:0xe0c030,
      IfcDistributionElement:0xe07050,IfcDistributionFlowElement:0xe07050,
      IfcBuildingElementProxy:0x607080,
      IfcSite:0x064e3b,
      DEFAULT:0x3b82f6
    };
    const matCache={};
    function getMat(type){
      if(!matCache[type]) matCache[type]=new THREE.MeshLambertMaterial({color:COLORS[type]||COLORS.DEFAULT,side:THREE.DoubleSide});
      return matCache[type];
    }

    // ── Mapa inverso TypeCode → nombre IFC (cubre TODOS los tipos) ──
    const codeToName=new Map();
    for(const [k,v] of Object.entries(WebIFC)){
      if(typeof v==='number') codeToName.set(v,k);
    }

    // ── Pre-mapeo de tipos conocidos (para colorear mallas) ──
    prog(58,'Mapeando tipos IFC...');
    const typeOfID=new Map(); // expressID → IfcTypeName
    const knownTypes=Object.keys(COLORS).filter(k=>k.startsWith('Ifc'));
    try{
      for(const typeName of knownTypes){
        const code=WebIFC[typeName];
        if(!code)continue;
        const ids=ifcAPI.GetLineIDsWithType(modelID,code);
        for(let i=0;i<ids.size();i++) typeOfID.set(ids.get(i),typeName);
      }
    }catch(_){}

    // ── Stream mallas ────────────────────────────────────
    prog(64,'Construyendo mallas 3D...');
    const meshMap=new Map(); // expressID → Mesh[]
    const allMeshes=[];
    const group=new THREE.Group();
    let n=0;

    ifcAPI.StreamAllMeshes(modelID,flatMesh=>{
      const eid=flatMesh.expressID;
      const gc=flatMesh.geometries.size();
      const type=typeOfID.get(eid)||'DEFAULT';
      const mshList=[];
      for(let i=0;i<gc;i++){
        const placed=flatMesh.geometries.get(i);
        const gd=ifcAPI.GetGeometry(modelID,placed.geometryExpressID);
        const idx=ifcAPI.GetIndexArray(gd.GetIndexData(),gd.GetIndexDataSize());
        const vtx=ifcAPI.GetVertexArray(gd.GetVertexData(),gd.GetVertexDataSize());
        if(!vtx||!idx||vtx.length===0){gd.delete();continue;}
        const pos=new Float32Array(vtx.length/2),nrm=new Float32Array(vtx.length/2);
        for(let j=0,k=0;j<vtx.length;j+=6,k+=3){pos[k]=vtx[j];pos[k+1]=vtx[j+1];pos[k+2]=vtx[j+2];nrm[k]=vtx[j+3];nrm[k+1]=vtx[j+4];nrm[k+2]=vtx[j+5];}
        const geo=new THREE.BufferGeometry();
        geo.setAttribute('position',new THREE.BufferAttribute(pos,3));
        geo.setAttribute('normal',new THREE.BufferAttribute(nrm,3));
        geo.setIndex(new THREE.BufferAttribute(idx,1));
        const mesh=new THREE.Mesh(geo,getMat(type));
        mesh.matrix.fromArray(placed.flatTransformation);
        mesh.matrixAutoUpdate=false;
        mesh.userData.expressID=eid;
        group.add(mesh);mshList.push(mesh);allMeshes.push(mesh);n++;
        gd.delete();
      }
      if(mshList.length) meshMap.set(eid,mshList);
    });

    if(n===0) throw new Error('El modelo no contiene geometría visible.');
    scene.add(group);

    // ── Cámara ──────────────────────────────────────────
    prog(82,'Ajustando cámara...');
    const box=new THREE.Box3().setFromObject(group);
    const ctr=box.getCenter(new THREE.Vector3());
    const sz=box.getSize(new THREE.Vector3());
    const dist=Math.max(sz.x,sz.y,sz.z)*1.8;
    controls.setView(ctr,dist);
    initialCenter=ctr.clone();initialDist=dist;

    // ── Nombres en español para tipos IFC (Opción A — universal) ──
    const IFC_TYPE_ES={
      IfcWall:'Muros',IfcWallStandardCase:'Muros',IfcCurtainWall:'Muros cortina',
      IfcSlab:'Losas',IfcRamp:'Rampas',IfcRampFlight:'Rampas',
      IfcColumn:'Columnas',IfcBeam:'Vigas',
      IfcDoor:'Puertas',IfcWindow:'Ventanas',
      IfcRoof:'Techos',IfcStair:'Escaleras',IfcStairFlight:'Tramos de escalera',
      IfcRailing:'Barandas',
      IfcFurnishingElement:'Mobiliario',IfcFurniture:'Mobiliario',
      IfcSite:'Terreno',IfcBuildingElementProxy:'Modelos genéricos',
      IfcPlate:'Placas',IfcMember:'Perfiles estructurales',
      IfcFooting:'Cimentaciones',IfcPile:'Pilotes',
      IfcFlowSegment:'Tuberías / Conductos',
      IfcPipeSegment:'Tuberías',IfcDuctSegment:'Conductos',
      IfcCableSegment:'Cables',
      IfcFlowTerminal:'Terminales MEP',
      IfcAirTerminal:'Difusores / Rejillas',IfcLamp:'Luminarias',
      IfcSanitaryTerminal:'Aparatos sanitarios',
      IfcFlowFitting:'Accesorios MEP',
      IfcPipeFitting:'Accesorios de tubería',IfcDuctFitting:'Accesorios de conducto',
      IfcFlowController:'Controladores MEP',IfcValve:'Válvulas',IfcDamper:'Compuertas',
      IfcFlowMovingDevice:'Equipos de movimiento',IfcPump:'Bombas',IfcFan:'Ventiladores',
      IfcFlowStorageDevice:'Depósitos',IfcTank:'Tanques',
      IfcEnergyConversionDevice:'Equipos de energía',
      IfcBoiler:'Calderas',IfcChiller:'Enfriadoras',
      IfcElectricDistributionBoard:'Tableros eléctricos',
      IfcElectricAppliance:'Aparatos eléctricos',
      IfcDistributionElement:'Distribución MEP',
      IfcDistributionFlowElement:'Flujo MEP',
      DEFAULT:'Sin categoría'
    };

    // ── Leer nombre, tipo real y ObjectType de cada elemento ──
    prog(88,'Leyendo nombres y tipos...');
    const elemNames=new Map();     // expressID → string
    const elemObjType=new Map();   // expressID → ObjectType string (categoría Revit)

    for(const [eid] of meshMap){
      try{
        const ln=ifcAPI.GetLine(modelID,eid,false);
        const name=ln.Name?.value||ln.LongName?.value||('#'+eid);
        elemNames.set(eid,name);
        // ObjectType contiene la categoría Revit ("Equipos eléctricos", etc.)
        const objType=ln.ObjectType?.value||'';
        elemObjType.set(eid,objType);
        // Completar typeOfID para elementos no cubiertos por el pre-mapeo
        if(!typeOfID.has(eid)){
          const rawName=codeToName.get(ln.type)||'DEFAULT';
          typeOfID.set(eid,rawName);
        }
      }catch(_){elemNames.set(eid,'#'+eid);}
    }

    // ── Mapear elementos → nivel via IfcRelContainedInSpatialStructure ──
    prog(92,'Construyendo árbol...');
    const storeyOfID=new Map();
    const storeyOrder=[];

    try{
      // 1. Recopilar estructuras espaciales: IfcBuildingStorey + IfcBuilding + IfcSite
      //    como fallback para modelos sin pisos (infraestructura, MEP, civil)
      const spatialNames=new Map();  // expressID → label
      const spatialElevs=new Map();  // expressID → elevación (para ordenar)
      const spatialPriority=new Map(); // expressID → prioridad (storey=0, building=1, site=2)

      const SPATIAL_TYPES=[
        {key:'IfcBuildingStorey', pri:0, prefix:''},
        {key:'IfcBuilding',       pri:1, prefix:'Edificio: '},
        {key:'IfcSite',           pri:2, prefix:'Terreno: '},
      ];

      for(const {key,pri,prefix} of SPATIAL_TYPES){
        const code=WebIFC[key]; if(!code) continue;
        const ids=ifcAPI.GetLineIDsWithType(modelID,code);
        for(let i=0;i<ids.size();i++){
          const sid=ids.get(i);
          try{
            const sl=ifcAPI.GetLine(modelID,sid,false);
            const rawName=sl.Name?.value||sl.LongName?.value||sl.Description?.value||null;
            const label=rawName?(prefix+rawName):(key==='IfcBuildingStorey'?('Nivel '+(i+1)):(prefix||key));
            const elev=typeof sl.Elevation?.value==='number'?sl.Elevation.value:(pri*1000+i*10);
            spatialNames.set(sid,label);
            spatialElevs.set(sid,elev);
            spatialPriority.set(sid,pri);
          }catch(_){}
        }
      }

      // Ordenar: primero por prioridad (storey antes que building/site), luego por elevación
      [...spatialNames.entries()]
        .sort((a,b)=>{
          const pa=spatialPriority.get(a[0])??9, pb=spatialPriority.get(b[0])??9;
          if(pa!==pb) return pa-pb;
          return (spatialElevs.get(a[0])??0)-(spatialElevs.get(b[0])??0);
        })
        .forEach(([,name])=>{if(!storeyOrder.includes(name))storeyOrder.push(name);});

      // 2. Relaciones IfcRelContainedInSpatialStructure → mapear elementos a su nivel
      const relIDs=ifcAPI.GetLineIDsWithType(modelID,WebIFC['IfcRelContainedInSpatialStructure']);
      for(let i=0;i<relIDs.size();i++){
        try{
          const rel=ifcAPI.GetLine(modelID,relIDs.get(i),false);
          const spatialID=rel.RelatingStructure?.value;
          if(!spatialID||!spatialNames.has(spatialID)) continue;
          const levelName=spatialNames.get(spatialID);
          const elems=rel.RelatedElements;
          if(!Array.isArray(elems)) continue;
          for(const ref of elems){
            const eid=ref?.value??ref;
            if(eid&&meshMap.has(eid)) storeyOfID.set(eid,levelName);
          }
        }catch(_){}
      }
    }catch(_){}

    // Fallback: elementos sin nivel asignado
    for(const [eid] of meshMap){
      if(!storeyOfID.has(eid)) storeyOfID.set(eid,'Sin nivel');
    }

    // Cerrar modelo
    ifcAPI.CloseModel(modelID);

    // ── Convertir nombre IFC a categoría legible ────────
    function resolveCategory(ifcType){
      if(!ifcType||ifcType==='DEFAULT') return 'Sin categoría';
      // Búsqueda directa en mapa ES
      if(IFC_TYPE_ES[ifcType]) return IFC_TYPE_ES[ifcType];
      // Normalizar: 'IFCWALL' → 'IfcWall' (web-ifc puede exportar en mayúsculas)
      const normalized=ifcType.replace(/^IFC/i,'Ifc');
      if(IFC_TYPE_ES[normalized]) return IFC_TYPE_ES[normalized];
      // Fallback: separar camelCase → palabras legibles
      // 'IfcBuildingElementProxy' → 'Building Element Proxy'
      // 'IFCFLOWTERMINAL' → 'Ifc Flow Terminal' → prettify
      const pretty=(normalized.startsWith('Ifc')?normalized.slice(3):normalized)
        .replace(/([A-Z])/g,' $1').trim();
      return pretty||ifcType;
    }

    // ── treeData: nivel → categoría → [{expressID, name}] ──
    // Categoría: ObjectType (Revit) si existe, si no → tipo IFC en español
    const treeData=new Map();

    for(const [eid,name] of elemNames){
      const storey=storeyOfID.get(eid)||'Sin nivel';
      const objType=elemObjType.get(eid)||'';
      const cat=objType||resolveCategory(typeOfID.get(eid)||'DEFAULT');
      if(!treeData.has(storey)) treeData.set(storey,new Map());
      const cats=treeData.get(storey);
      if(!cats.has(cat)) cats.set(cat,[]);
      cats.get(cat).push({expressID:eid,name});
    }

    // ═══════════════════════════════════════════════════
    //  SELECCIÓN — declaraciones de estado (antes de buildHierarchyTree)
    // ═══════════════════════════════════════════════════
    const H_SINGLE=new THREE.MeshLambertMaterial({color:0xfbbf24,side:THREE.DoubleSide,transparent:true,opacity:.85});
    const H_MULTI =new THREE.MeshLambertMaterial({color:0xf97316,side:THREE.DoubleSide,transparent:true,opacity:.75});
    const raycaster=new THREE.Raycaster();
    const mouse=new THREE.Vector2();

    let selectedIDs=new Set();
    let prevMats=new Map();
    let isolateMode=false;
    const hiddenIDs=new Set();
    const elemRowMap=new Map(); // expressID → .elem-row DOM element

    prog(98,'Renderizando árbol...');
    buildHierarchyTree(treeData,storeyOrder);
    buildCategoriesView(treeData);

    prog(100,'¡Modelo cargado! ('+n+' elementos)');
    setTimeout(()=>{
      document.getElementById('overlay').style.display='none';
      document.getElementById('toolbar').style.display='flex';
      document.getElementById('sidebar').style.display='flex';
    },300);

    function clearSelection(){
      for(const [mesh,mat] of prevMats) mesh.material=mat;
      prevMats.clear();selectedIDs.clear();
      document.querySelectorAll('.elem-row.selected,.elem-row.multi-selected').forEach(r=>r.classList.remove('selected','multi-selected'));
      updateSelBar();
    }

    function applyHL(eid,multi=false){
      const meshes=meshMap.get(eid)||[];
      const mat=multi?H_MULTI:H_SINGLE;
      for(const m of meshes){if(!prevMats.has(m))prevMats.set(m,m.material);m.material=mat;}
    }

    function selectElement(eid,add=false){
      if(!add){
        clearSelection();
        selectedIDs.add(eid);
        applyHL(eid,false);
        scrollToElem(eid);
        const row=elemRowMap.get(eid);
        if(row){row.classList.add('selected');}
        showProps(eid);
        switchTab('props');
      } else {
        if(selectedIDs.has(eid)){
          selectedIDs.delete(eid);
          const meshes=meshMap.get(eid)||[];
          for(const m of meshes){if(prevMats.has(m)){m.material=prevMats.get(m);prevMats.delete(m);}}
          const row=elemRowMap.get(eid);
          if(row) row.classList.remove('selected','multi-selected');
        } else {
          selectedIDs.add(eid);
          applyHL(eid,true);
          const row=elemRowMap.get(eid);
          if(row){row.classList.remove('selected');row.classList.add('multi-selected');}
        }
        if(selectedIDs.size===1){
          const first=[...selectedIDs][0];
          const meshes=meshMap.get(first)||[];
          for(const m of meshes) m.material=H_SINGLE;
          const row=elemRowMap.get(first);
          if(row){row.classList.remove('multi-selected');row.classList.add('selected');}
        }
      }
      updateSelBar();
    }

    function updateSelBar(){
      const bar=document.getElementById('sel-bar');
      bar.style.display=selectedIDs.size>1?'flex':'none';
      document.getElementById('sel-count').textContent=selectedIDs.size+' seleccionados';
    }

    // Scroll árbol al nodo del elemento
    function scrollToElem(eid){
      const row=elemRowMap.get(eid);
      if(!row) return;
      // Expandir ancestros (cat-children, storey-children)
      let p=row.parentElement;
      while(p&&p.id!=='view-hierarchy'){
        if(p.classList.contains('cat-children')||p.classList.contains('storey-children')){
          p.classList.remove('collapsed');
          const hdr=p.previousSibling;
          if(hdr){
            const arr=hdr.querySelector('.storey-arrow,.cat-arrow');
            if(arr) arr.textContent='▼';
          }
        }
        p=p.parentElement;
      }
      setTimeout(()=>row.scrollIntoView({block:'nearest',behavior:'smooth'}),50);
    }

    function focusElement(eid){
      const meshes=meshMap.get(eid)||[];
      if(!meshes.length) return;
      const b=new THREE.Box3();
      meshes.forEach(m=>b.union(new THREE.Box3().setFromObject(m)));
      const c=b.getCenter(new THREE.Vector3());
      const s=b.getSize(new THREE.Vector3());
      controls.setView(c,Math.max(s.x,s.y,s.z)*2.5);
    }

    // Click canvas
    renderer.domElement.addEventListener('click',e=>{
      if(measureMode){handleMeasureClick(e);return;}
      if(e.button!==0) return;
      const rect=renderer.domElement.getBoundingClientRect();
      mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
      mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
      raycaster.setFromCamera(mouse,camera);
      const hits=raycaster.intersectObjects(allMeshes.filter(m=>m.visible),false);
      if(hits.length){
        const eid=hits[0].object.userData.expressID;
        if(eid) selectElement(eid,e.ctrlKey||e.metaKey);
      } else {
        if(!e.ctrlKey&&!e.metaKey) clearSelection();
      }
    });

    // ═══════════════════════════════════════════════════
    //  VISIBILIDAD — helpers
    // ═══════════════════════════════════════════════════
    // eids: array de expressID
    function setVisible(eids,visible){
      for(const eid of eids){
        const meshes=meshMap.get(eid)||[];
        meshes.forEach(m=>{m.visible=visible;});
        if(!visible) hiddenIDs.add(eid);
        else hiddenIDs.delete(eid);
      }
    }

    // Recopilar todos los expressIDs bajo un grupo de nodos DOM
    function collectEids(containerEl){
      const eids=[];
      containerEl.querySelectorAll('.elem-row[data-eid]').forEach(r=>{
        const eid=parseInt(r.dataset.eid);
        if(!isNaN(eid)) eids.push(eid);
      });
      return eids;
    }

    function updateEyeBtn(btn,visible){
      if(visible){btn.textContent='👁';btn.classList.remove('is-hidden');btn.title='Ocultar';}
      else{btn.textContent='🚫';btn.classList.add('is-hidden');btn.title='Mostrar';}
    }

    // ═══════════════════════════════════════════════════
    //  ÁRBOL JERARQUÍA — Nivel → Categoría → Elemento
    // ═══════════════════════════════════════════════════
    function buildHierarchyTree(treeData,storeyOrder){
      const root=document.getElementById('view-hierarchy');
      root.innerHTML='';
      if(treeData.size===0){
        root.innerHTML='<div style="font-size:11px;color:#475569;padding:12px;">Sin datos de árbol disponibles</div>';
        return;
      }

      // Ordenar: primero los storeys en orden encontrado, "Sin nivel" al final
      const ordered=[
        ...storeyOrder.filter(s=>treeData.has(s)),
        ...[...treeData.keys()].filter(s=>!storeyOrder.includes(s))
      ];

      for(const storeyName of ordered){
        const cats=treeData.get(storeyName);
        if(!cats||cats.size===0) continue;

        const totalElems=[...cats.values()].reduce((a,b)=>a+b.length,0);

        // ── Storey wrapper ──
        const storeyWrap=document.createElement('div');

        // Storey header row
        const storeyRow=document.createElement('div');
        storeyRow.className='storey-row';
        storeyRow.innerHTML=`<span class="storey-arrow">▼</span><span class="storey-icon">📐</span><span class="storey-name" title="${storeyName}">${storeyName}</span><span class="storey-count">${totalElems}</span><button class="eye-btn" title="Ocultar nivel">👁</button>`;

        const storeyChildren=document.createElement('div');
        storeyChildren.className='storey-children';

        // Toggle colapso de storey
        const storeyArrow=storeyRow.querySelector('.storey-arrow');
        storeyRow.addEventListener('click',e=>{
          if(e.target.classList.contains('eye-btn')) return;
          const collapsed=storeyChildren.classList.toggle('collapsed');
          storeyArrow.textContent=collapsed?'▶':'▼';
        });

        // Eye en storey → ocultar/mostrar todos sus elementos
        const storeyEye=storeyRow.querySelector('.eye-btn');
        let storeyVisible=true;
        storeyEye.addEventListener('click',e=>{
          e.stopPropagation();
          storeyVisible=!storeyVisible;
          const eids=collectEids(storeyChildren);
          setVisible(eids,storeyVisible);
          updateEyeBtn(storeyEye,storeyVisible);
          // Sincronizar eyes de categorías
          storeyChildren.querySelectorAll('.cat-row .eye-btn').forEach(b=>{
            updateEyeBtn(b,storeyVisible);b._visible=storeyVisible;
          });
        });
        storeyEye._visible=true;

        // ── Categorías ──
        const sortedCats=[...cats.entries()].sort((a,b)=>b[1].length-a[1].length);
        for(const [catName,elems] of sortedCats){
          const catWrap=document.createElement('div');

          const catRow=document.createElement('div');
          catRow.className='cat-row';
          catRow.innerHTML=`<span class="cat-arrow">▼</span><span class="cat-icon">▪</span><span class="cat-name" title="${catName}">${catName}</span><span class="cat-count">${elems.length}</span><button class="eye-btn" title="Ocultar categoría">👁</button>`;

          const catChildren=document.createElement('div');
          catChildren.className='cat-children';

          const catArrow=catRow.querySelector('.cat-arrow');
          catRow.addEventListener('click',e=>{
            if(e.target.classList.contains('eye-btn')) return;
            const collapsed=catChildren.classList.toggle('collapsed');
            catArrow.textContent=collapsed?'▶':'▼';
          });

          // Eye en categoría
          const catEye=catRow.querySelector('.eye-btn');
          catEye._visible=true;
          catEye.addEventListener('click',e=>{
            e.stopPropagation();
            catEye._visible=!catEye._visible;
            const eids=collectEids(catChildren);
            setVisible(eids,catEye._visible);
            updateEyeBtn(catEye,catEye._visible);
          });

          // ── Elementos ──
          for(const {expressID,name} of elems){
            const elemRow=document.createElement('div');
            elemRow.className='elem-row';
            elemRow.dataset.eid=String(expressID);
            elemRow.dataset.label=name.toLowerCase();
            elemRow.innerHTML=`<span class="elem-label" title="${name}">${name}</span><button class="eye-btn" title="Ocultar">👁</button>`;

            // Seleccionar elemento
            elemRow.addEventListener('click',e=>{
              if(e.target.classList.contains('eye-btn')) return;
              selectElement(expressID,e.ctrlKey||e.metaKey);
            });
            elemRow.addEventListener('dblclick',e=>{e.stopPropagation();focusElement(expressID);});

            // Eye en elemento
            const elemEye=elemRow.querySelector('.eye-btn');
            elemEye._visible=true;
            elemEye.addEventListener('click',e=>{
              e.stopPropagation();
              elemEye._visible=!elemEye._visible;
              setVisible([expressID],elemEye._visible);
              updateEyeBtn(elemEye,elemEye._visible);
            });

            catChildren.appendChild(elemRow);
            elemRowMap.set(expressID,elemRow);
          }

          catWrap.appendChild(catRow);
          catWrap.appendChild(catChildren);
          storeyChildren.appendChild(catWrap);
        }

        storeyWrap.appendChild(storeyRow);
        storeyWrap.appendChild(storeyChildren);
        root.appendChild(storeyWrap);
      }
    }

    // ═══════════════════════════════════════════════════
    //  ÁRBOL CATEGORÍAS (vista plana agrupada)
    // ═══════════════════════════════════════════════════
    function buildCategoriesView(treeData){
      // Aplanar: cat → [{expressID, name, storey}]
      const catFlat=new Map();
      for(const [storey,cats] of treeData){
        for(const [cat,elems] of cats){
          if(!catFlat.has(cat)) catFlat.set(cat,[]);
          for(const e of elems) catFlat.get(cat).push({...e,storey});
        }
      }
      const root=document.getElementById('view-categories');
      root.innerHTML='';
      const sorted=[...catFlat.entries()].sort((a,b)=>b[1].length-a[1].length);

      for(const [catName,elems] of sorted){
        const grp=document.createElement('div');
        grp.style.marginBottom='2px';

        const hdr=document.createElement('div');
        hdr.className='cat-row';
        hdr.style.paddingLeft='6px';
        hdr.innerHTML=`<span class="cat-arrow">▶</span><span class="cat-icon">▪</span><span class="cat-name" title="${catName}">${catName}</span><span class="cat-count">${elems.length}</span>`;
        const list=document.createElement('div');
        list.className='cat-children collapsed';
        list.style.paddingLeft='20px';

        hdr.addEventListener('click',()=>{
          const c=list.classList.toggle('collapsed');
          hdr.querySelector('.cat-arrow').textContent=c?'▶':'▼';
        });

        for(const {expressID,name} of elems){
          const el=document.createElement('div');
          el.className='elem-row';
          el.dataset.eid=String(expressID);
          el.dataset.label=name.toLowerCase();
          el.innerHTML=`<span class="elem-label" title="${name}">${name}</span>`;
          el.addEventListener('click',e=>{selectElement(expressID,e.ctrlKey||e.metaKey);switchTab('tree');});
          el.addEventListener('dblclick',()=>{focusElement(expressID);});
          list.appendChild(el);
        }
        grp.appendChild(hdr);grp.appendChild(list);
        root.appendChild(grp);
      }
    }

    // ═══════════════════════════════════════════════════
    //  BUSCADOR
    // ═══════════════════════════════════════════════════
    let currentView='hierarchy';
    const searchInput=document.getElementById('search-input');
    const searchClear=document.getElementById('search-clear');

    searchInput.addEventListener('input',()=>{
      searchClear.style.display=searchInput.value?'block':'none';
      applySearch(searchInput.value.trim().toLowerCase());
    });
    searchClear.addEventListener('click',()=>{searchInput.value='';searchClear.style.display='none';applySearch('');});

    function applySearch(q){
      if(currentView==='hierarchy'){
        const viewEl=document.getElementById('view-hierarchy');
        if(!q){
          viewEl.querySelectorAll('.elem-row').forEach(r=>{r.style.display='';r.querySelector('.elem-label').classList.remove('search-hl');});
          viewEl.querySelectorAll('.cat-children').forEach(c=>c.classList.remove('_force-open'));
          viewEl.querySelectorAll('.storey-children').forEach(c=>c.classList.remove('_force-open'));
          return;
        }
        viewEl.querySelectorAll('.elem-row').forEach(r=>{
          const lbl=r.dataset.label||'';
          const match=lbl.includes(q);
          r.style.display=match?'':'none';
          r.querySelector('.elem-label').classList.toggle('search-hl',match);
          if(match){
            let p=r.parentElement;
            while(p&&p!==viewEl){
              if(p.classList.contains('cat-children')||p.classList.contains('storey-children')){
                p.classList.remove('collapsed');
                const arr=p.previousSibling?.querySelector?.('.storey-arrow,.cat-arrow');
                if(arr) arr.textContent='▼';
              }
              p=p.parentElement;
            }
          }
        });
      } else {
        const viewEl=document.getElementById('view-categories');
        viewEl.querySelectorAll('.elem-row').forEach(r=>{
          const lbl=r.dataset.label||'';
          const match=!q||lbl.includes(q);
          r.style.display=match?'':'none';
        });
        viewEl.querySelectorAll('.cat-row').forEach(row=>{
          const list=row.nextSibling;
          if(!list) return;
          const hasVisible=[...list.querySelectorAll('.elem-row')].some(r=>r.style.display!=='none');
          row.parentElement.style.display=(!q||hasVisible)?'':'none';
          if(q&&hasVisible){list.classList.remove('collapsed');row.querySelector('.cat-arrow').textContent='▼';}
        });
      }
    }

    // ── Sub-tabs árbol ──
    document.getElementById('stab-hierarchy').addEventListener('click',()=>{
      currentView='hierarchy';
      document.getElementById('stab-hierarchy').classList.add('active');
      document.getElementById('stab-categories').classList.remove('active');
      document.getElementById('view-hierarchy').style.display='block';
      document.getElementById('view-categories').style.display='none';
      searchInput.placeholder='🔍  Buscar en jerarquía…';
      applySearch(searchInput.value.trim().toLowerCase());
    });
    document.getElementById('stab-categories').addEventListener('click',()=>{
      currentView='categories';
      document.getElementById('stab-categories').classList.add('active');
      document.getElementById('stab-hierarchy').classList.remove('active');
      document.getElementById('view-hierarchy').style.display='none';
      document.getElementById('view-categories').style.display='block';
      searchInput.placeholder='🔍  Buscar categoría…';
      applySearch(searchInput.value.trim().toLowerCase());
    });

    // ── Sidebar main tabs ──
    document.querySelectorAll('.stab').forEach(tab=>{
      tab.addEventListener('click',()=>switchTab(tab.dataset.tab));
    });
    function switchTab(name){
      document.querySelectorAll('.stab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
      document.querySelectorAll('.spanel').forEach(p=>p.classList.toggle('active',p.id==='tab-'+name));
      const inTree=name==='tree';
      document.getElementById('tree-subtabs').style.display=inTree?'flex':'none';
      document.getElementById('search-wrap').style.display=inTree?'block':'none';
      document.getElementById('sel-bar').style.display=(inTree&&selectedIDs.size>1)?'flex':'none';
    }

    // ═══════════════════════════════════════════════════
    //  PROPIEDADES
    // ═══════════════════════════════════════════════════
    async function showProps(eid){
      const content=document.getElementById('prop-content');
      const empty=document.getElementById('prop-empty');
      const nameEl=document.getElementById('prop-elem-name');
      empty.style.display='none';
      nameEl.style.display='block';
      content.style.display='block';
      nameEl.textContent=elemNames.get(eid)||('#'+eid);
      content.innerHTML='<div style="padding:8px;font-size:10px;color:#475569;">Cargando…</div>';

      if(!ifcBuffer){
        content.innerHTML='<div style="padding:8px;font-size:10px;color:#475569;">Modelo no disponible.</div>';
        return;
      }
      try{
        // Reutilizar la instancia ifcAPI ya inicializada; solo abrir un modelo temporal
        const m2=ifcAPI.OpenModel(new Uint8Array(ifcBuffer),{COORDINATE_TO_ORIGIN:true,USE_FAST_BOOLS:true});
        const props=ifcAPI.GetItemProperties(m2,eid,false);
        let psets=[];
        try{psets=ifcAPI.GetPropertySets(m2,eid)||[];}catch(_){}
        ifcAPI.CloseModel(m2);
        content.innerHTML='';

        // Grupo "Parámetros IFC" con atributos básicos del elemento
        const IFC_ATTR_KEYS=['Name','ObjectType','Description','Tag','GlobalId','LongName'];
        const ifcAttrs=[];
        if(props){
          for(const k of IFC_ATTR_KEYS){
            if(props[k]?.value!=null) ifcAttrs.push([k,String(props[k].value)]);
          }
        }
        if(ifcAttrs.length) content.appendChild(mkGroup('Parámetros IFC',ifcAttrs,true));

        // Un grupo colapsable por cada PropertySet
        if(psets?.length){
          for(const ps of psets){
            if(!ps.HasProperties?.length) continue;
            const rows=[];
            for(const p of ps.HasProperties){
              const nm=p.Name?.value||'';
              const vl=p.NominalValue?.value??p.Value?.value??'-';
              if(nm) rows.push([nm,String(vl)]);
            }
            if(rows.length) content.appendChild(mkGroup(ps.Name?.value||'PropertySet',rows,false));
          }
        }

        if(!content.firstChild){
          content.innerHTML='<div style="padding:8px;font-size:10px;color:#475569;">Sin propiedades disponibles.</div>';
        }
      }catch(err){
        content.innerHTML=`<div style="padding:8px;font-size:10px;color:#ef4444;">${err.message||String(err)}</div>`;
      }
    }

    function mkGroup(title,rows,open){
      const grp=document.createElement('div');
      grp.className='prop-group';
      const hdr=document.createElement('div');
      hdr.className='prop-group-header';
      hdr.innerHTML=`<span class="prop-group-arrow">${open?'▼':'▶'}</span><span>${title}</span><span style="margin-left:auto;font-size:9px;color:#334155;">${rows.length}</span>`;
      const body=document.createElement('div');
      body.className='prop-group-body'+(open?' open':'');
      for(const [k,v] of rows) body.appendChild(mkRow(k,v));
      hdr.addEventListener('click',()=>{
        const isOpen=body.classList.toggle('open');
        hdr.querySelector('.prop-group-arrow').textContent=isOpen?'▼':'▶';
      });
      grp.appendChild(hdr);grp.appendChild(body);
      return grp;
    }
    function mkRow(k,v){const d=document.createElement('div');d.className='prop-row';d.innerHTML=`<span class="prop-key" title="${k}">${k}</span><span class="prop-val" title="${v}">${v}</span>`;return d;}

    // ═══════════════════════════════════════════════════
    //  AISLAMIENTO
    // ═══════════════════════════════════════════════════
    function enterIsolate(ids){
      for(const m of allMeshes) m.visible=ids.has(m.userData.expressID);
      isolateMode=true;
      document.getElementById('btn-isolate').classList.add('active');
      document.getElementById('isolate-banner').style.display='block';
    }
    function exitIsolate(){
      for(const m of allMeshes) m.visible=!hiddenIDs.has(m.userData.expressID);
      isolateMode=false;
      document.getElementById('btn-isolate').classList.remove('active');
      document.getElementById('isolate-banner').style.display='none';
    }
    document.getElementById('btn-isolate').onclick=()=>{
      if(isolateMode){exitIsolate();return;}
      if(selectedIDs.size===0) return;
      enterIsolate(new Set(selectedIDs));
    };
    document.getElementById('btn-sel-isolate').onclick=()=>{if(selectedIDs.size)enterIsolate(new Set(selectedIDs));};
    document.getElementById('btn-sel-clear').onclick=()=>clearSelection();
    document.getElementById('btn-sel-hide').onclick=()=>{
      for(const id of selectedIDs){const ms=meshMap.get(id)||[];ms.forEach(m=>{m.visible=false;});hiddenIDs.add(id);}
      clearSelection();
    };

    document.getElementById('btn-showall').onclick=()=>{
      exitIsolate();
      for(const id of hiddenIDs){const ms=meshMap.get(id)||[];ms.forEach(m=>{m.visible=true;});}
      hiddenIDs.clear();
      // Restaurar todos los eyes del árbol a visible
      document.querySelectorAll('.eye-btn.is-hidden').forEach(b=>{updateEyeBtn(b,true);b._visible=true;});
    };

    // ═══════════════════════════════════════════════════
    //  SECCIÓN
    // ═══════════════════════════════════════════════════
    const clipPlanes={x:null,y:null,z:null};
    const boxCenter=box.getCenter(new THREE.Vector3());

    function toggleSection(axis){
      const btn=document.getElementById('btn-s'+axis);
      if(clipPlanes[axis]){
        renderer.clippingPlanes=renderer.clippingPlanes.filter(p=>p!==clipPlanes[axis]);
        clipPlanes[axis]=null;btn.classList.remove('active');
        document.getElementById('section-hint').style.display='none';
      } else {
        const normals={x:new THREE.Vector3(1,0,0),y:new THREE.Vector3(0,1,0),z:new THREE.Vector3(0,0,1)};
        const plane=new THREE.Plane(normals[axis],-boxCenter[axis]);
        clipPlanes[axis]=plane;
        renderer.clippingPlanes=[...renderer.clippingPlanes,plane];
        btn.classList.add('active');
        const hint=document.getElementById('section-hint');
        hint.innerHTML=`✂ Sección ${axis.toUpperCase()} activa`;
        hint.style.display='block';
        setTimeout(()=>{hint.style.display='none';},2500);
      }
    }
    document.getElementById('btn-sx').onclick=()=>toggleSection('x');
    document.getElementById('btn-sy').onclick=()=>toggleSection('y');
    document.getElementById('btn-sz').onclick=()=>toggleSection('z');

    // ═══════════════════════════════════════════════════
    //  MEDICIÓN
    // ═══════════════════════════════════════════════════
    let measureMode=false;
    const measurePoints=[],measureMarkers=[],measureLines=[];
    const MK_GEO=new THREE.SphereGeometry(0.08,8,8);
    const MK_MAT=new THREE.MeshBasicMaterial({color:0xfbbf24});
    const LN_MAT=new THREE.LineBasicMaterial({color:0xfbbf24});

    function setMeasure(on){
      measureMode=on;
      document.getElementById('btn-measure').classList.toggle('active',on);
      document.getElementById('crosshair').style.display=on?'block':'none';
      renderer.domElement.style.cursor=on?'crosshair':'default';
      if(!on) document.getElementById('measure-tip').style.display='none';
    }
    function clearMeasure(){
      measurePoints.length=0;
      for(const m of measureMarkers) scene.remove(m);
      for(const l of measureLines) scene.remove(l);
      measureMarkers.length=0;measureLines.length=0;
      document.getElementById('measure-tip').style.display='none';
    }
    function handleMeasureClick(e){
      const rect=renderer.domElement.getBoundingClientRect();
      mouse.x=((e.clientX-rect.left)/rect.width)*2-1;
      mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
      raycaster.setFromCamera(mouse,camera);
      const hits=raycaster.intersectObjects(allMeshes.filter(m=>m.visible),false);
      if(!hits.length) return;
      const pt=hits[0].point.clone();
      measurePoints.push(pt);
      const mk=new THREE.Mesh(MK_GEO,MK_MAT);mk.position.copy(pt);scene.add(mk);measureMarkers.push(mk);
      if(measurePoints.length>=2){
        const a=measurePoints[measurePoints.length-2],b=measurePoints[measurePoints.length-1];
        const ln=new THREE.Line(new THREE.BufferGeometry().setFromPoints([a,b]),LN_MAT);
        scene.add(ln);measureLines.push(ln);
        const tip=document.getElementById('measure-tip');
        tip.textContent='📏 '+a.distanceTo(b).toFixed(3)+' m';
        tip.style.display='block';
      }
    }
    document.getElementById('btn-measure').onclick=()=>{if(measureMode){clearMeasure();setMeasure(false);}else setMeasure(true);};

    // ═══════════════════════════════════════════════════
    //  TOOLBAR — resto
    // ═══════════════════════════════════════════════════
    let wire=false;
    document.getElementById('btn-r').onclick=()=>controls.setView(initialCenter,initialDist);
    document.getElementById('btn-fit').onclick=()=>{if(selectedIDs.size)focusElement([...selectedIDs][0]);else controls.setView(initialCenter,initialDist);};
    document.getElementById('btn-w').onclick=()=>{
      wire=!wire;
      document.getElementById('btn-w').classList.toggle('active',wire);
      for(const mat of Object.values(matCache)) mat.wireframe=wire;
    };
    let sidebarVisible=true;
    document.getElementById('btn-panel').onclick=()=>{
      sidebarVisible=!sidebarVisible;
      document.getElementById('sidebar').style.display=sidebarVisible?'flex':'none';
      document.getElementById('btn-panel').classList.toggle('active',sidebarVisible);
    };

  }catch(e){showErr(e.message||String(e));}
})();
</script>
</body>
</html>
