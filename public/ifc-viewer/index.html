<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor IFC — Infrale 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050d1a; overflow: hidden; height: 100vh; font-family: system-ui, sans-serif; color: #e2e8f0; }
    #container { width: 100%; height: 100vh; position: relative; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: #050d1a; z-index: 10; }
    .spinner { width: 36px; height: 36px; border: 3px solid #1e3a5f; border-top-color: #2563eb; border-radius: 50%; animation: spin .8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlay p     { font-size: 14px; color: #94a3b8; }
    #overlay small { font-size: 12px; color: #475569; }
    .pb { width: 220px; height: 3px; background: #1e3a5f; border-radius: 2px; overflow: hidden; }
    .pf { height: 100%; background: #2563eb; border-radius: 2px; transition: width .5s ease; }
    #err { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; background: #050d1a; padding: 32px; text-align: center; }
    #err svg { width: 42px; height: 42px; color: #ef4444; }
    #err h3  { font-size: 15px; color: #ef4444; }
    #err p   { font-size: 12px; color: #64748b; max-width: 420px; line-height: 1.75; }
    #err button { background: #1e3a5f; border: 1px solid #2563eb55; color: #94a3b8; padding: 8px 20px; border-radius: 8px; font-size: 12px; cursor: pointer; margin-top: 4px; }
    #err button:hover { color: #e2e8f0; background: #0f2035; }
    #controls { position: absolute; top: 12px; right: 12px; display: none; gap: 6px; }
    .ctrl { background: rgba(5,13,26,.88); border: 1px solid #1e3a5f; color: #94a3b8; padding: 6px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: all .15s; }
    .ctrl:hover { background: #0f2035; color: #e2e8f0; border-color: #2563eb; }
    #bar2 { position: absolute; bottom: 12px; left: 12px; display: none; align-items: center; gap: 8px; background: rgba(5,13,26,.88); border: 1px solid #1e3a5f; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #94a3b8; pointer-events: none; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #2563eb; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="container">
  <div id="overlay">
    <div class="spinner"></div>
    <p id="msg">Cargando visor...</p>
    <small id="sub">Iniciando Three.js</small>
    <div class="pb"><div class="pf" id="bar" style="width:0%"></div></div>
  </div>
  <div id="err">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
    <h3>Error al cargar el modelo</h3>
    <p id="errmsg"></p>
    <button onclick="location.reload()">↺ Reintentar</button>
  </div>
  <div id="controls">
    <button class="ctrl" id="btn-r">⟳ Reset</button>
    <button class="ctrl" id="btn-w">◻ Wireframe</button>
  </div>
  <div id="bar2">
    <span class="dot"></span><span id="lbl">Modelo IFC</span>
    <span style="color:#334155">·</span>
    <span style="color:#475569">Arrastra · Scroll zoom · Clic derecho pan</span>
  </div>
</div>

<!-- Three.js UMD — solo build/, sin examples/js/ -->
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<!-- web-ifc WASM API — cargado desde CDN para que detecte su propio path del .wasm -->
<script src="https://cdn.jsdelivr.net/npm/web-ifc@0.0.77/web-ifc-api-iife.js"></script>

<script>
// ── Controlador de órbita mínimo (sin OrbitControls externo) ──────────────
class OrbitCtrl {
  constructor(cam, el) {
    this.cam = cam; this.el = el;
    this.target = new THREE.Vector3();
    this._r = 10; this._phi = Math.PI / 4; this._theta = Math.PI / 4;
    this._down = false; this._btn = -1; this._px = 0; this._py = 0;
    this._apply();
    el.addEventListener('mousedown',  e => { this._down = true;  this._btn = e.button; this._px = e.clientX; this._py = e.clientY; e.preventDefault(); });
    el.addEventListener('mouseup',    () => { this._down = false; });
    el.addEventListener('mouseleave', () => { this._down = false; });
    el.addEventListener('mousemove',  e => {
      if (!this._down) return;
      const dx = e.clientX - this._px, dy = e.clientY - this._py;
      this._px = e.clientX; this._py = e.clientY;
      if (this._btn === 0) this._orbit(dx, dy);
      else this._pan(dx, dy);
    });
    el.addEventListener('wheel', e => { this._r = Math.max(0.5, this._r * (1 + e.deltaY * 0.001)); this._apply(); e.preventDefault(); }, { passive: false });
    el.addEventListener('contextmenu', e => e.preventDefault());
  }
  _orbit(dx, dy) {
    this._theta -= dx * 0.006;
    this._phi = Math.max(0.05, Math.min(Math.PI - 0.05, this._phi - dy * 0.006));
    this._apply();
  }
  _pan(dx, dy) {
    const f = this._r * 0.001;
    const right = new THREE.Vector3().crossVectors(
      new THREE.Vector3().subVectors(this.cam.position, this.target).normalize(),
      new THREE.Vector3(0, 1, 0)
    ).normalize();
    this.target.addScaledVector(right, -dx * f);
    this.target.y += dy * f;
    this._apply();
  }
  _apply() {
    const sp = Math.sin(this._phi), cp = Math.cos(this._phi);
    const st = Math.sin(this._theta), ct = Math.cos(this._theta);
    this.cam.position.set(
      this.target.x + this._r * sp * st,
      this.target.y + this._r * cp,
      this.target.z + this._r * sp * ct
    );
    this.cam.lookAt(this.target);
  }
  setView(center, dist) {
    this.target.copy(center);
    this._r = dist;
    this._phi = Math.PI / 4; this._theta = Math.PI / 4;
    this._apply();
  }
  update() {} // compatible con loop que llama update()
}

// ── Main ─────────────────────────────────────────────────────────────────
(async function () {
  const params = new URLSearchParams(location.search);
  const fileUrl = params.get('url'), modelName = params.get('name') || 'Modelo IFC';

  function prog(p, m, s) {
    document.getElementById('bar').style.width = p + '%';
    if (m) document.getElementById('msg').textContent = m;
    if (s) document.getElementById('sub').textContent = s;
  }
  function showErr(t) {
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('err').style.display = 'flex';
    document.getElementById('errmsg').textContent = t;
  }

  if (!fileUrl) { showErr('No se especificó la URL del modelo.'); return; }
  if (typeof THREE === 'undefined')   { showErr('Three.js no cargó. Verifica tu conexión.'); return; }
  if (typeof WebIFC === 'undefined')  { showErr('Motor IFC no cargó. Verifica tu conexión.'); return; }

  document.getElementById('lbl').textContent = modelName;
  const timer = setTimeout(() => showErr('Tiempo de espera agotado (5 min).'), 5 * 60 * 1000);

  try {
    prog(8, 'Iniciando visor 3D...', 'Configurando escena');

    const scene    = new THREE.Scene();
    scene.background = new THREE.Color(0x050d1a);
    const cont     = document.getElementById('container');
    const camera   = new THREE.PerspectiveCamera(60, cont.clientWidth / cont.clientHeight, 0.01, 100000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(cont.clientWidth, cont.clientHeight);
    cont.appendChild(renderer.domElement);

    const controls = new OrbitCtrl(camera, renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 1.3);
    sun.position.set(50, 80, 50); scene.add(sun);
    scene.add(new THREE.GridHelper(1000, 60, 0x1e3a5f, 0x0f2035));

    window.addEventListener('resize', () => {
      camera.aspect = cont.clientWidth / cont.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(cont.clientWidth, cont.clientHeight);
    });
    (function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();

    prog(18, 'Descargando modelo...', 'Conectando con el servidor');
    let res;
    try { res = await fetch(fileUrl); }
    catch (e) { throw new Error('Error de red: ' + e.message); }
    if (!res.ok) throw new Error('Error HTTP ' + res.status + ' al descargar el modelo.');

    prog(36, 'Descargando modelo...', 'Recibiendo datos');
    const buffer = await res.arrayBuffer();

    prog(50, 'Inicializando motor IFC...', 'Cargando WASM');
    const ifcAPI = new WebIFC.IfcAPI();
    await ifcAPI.Init();

    prog(63, 'Procesando geometría...', 'Parseando el archivo IFC');
    const modelID = ifcAPI.OpenModel(new Uint8Array(buffer), { COORDINATE_TO_ORIGIN: true, USE_FAST_BOOLS: true });

    prog(76, 'Construyendo mallas 3D...', 'Generando geometría Three.js');

    const colors = [0x2563eb,0x0ea5e9,0x6366f1,0x8b5cf6,0x06b6d4,0x3b82f6,0x64748b,0x94a3b8];
    const mats   = colors.map(c => new THREE.MeshLambertMaterial({ color: c, side: THREE.DoubleSide }));
    const group  = new THREE.Group();
    let n = 0;

    ifcAPI.StreamAllMeshes(modelID, (flatMesh) => {
      const gc = flatMesh.geometries.size();
      for (let i = 0; i < gc; i++) {
        const placed   = flatMesh.geometries.get(i);
        const geomData = ifcAPI.GetGeometry(modelID, placed.geometryExpressID);
        const idxArr   = ifcAPI.GetIndexArray(geomData.GetIndexData(), geomData.GetIndexDataSize());
        const vtxArr   = ifcAPI.GetVertexArray(geomData.GetVertexData(), geomData.GetVertexDataSize());
        if (!vtxArr || !idxArr || vtxArr.length === 0 || idxArr.length === 0) { geomData.delete(); continue; }

        const posArr = new Float32Array(vtxArr.length / 2);
        const nrmArr = new Float32Array(vtxArr.length / 2);
        for (let j = 0, k = 0; j < vtxArr.length; j += 6, k += 3) {
          posArr[k] = vtxArr[j];   posArr[k+1] = vtxArr[j+1]; posArr[k+2] = vtxArr[j+2];
          nrmArr[k] = vtxArr[j+3]; nrmArr[k+1] = vtxArr[j+4]; nrmArr[k+2] = vtxArr[j+5];
        }

        const geo  = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        geo.setAttribute('normal',   new THREE.BufferAttribute(nrmArr, 3));
        geo.setIndex(new THREE.BufferAttribute(idxArr, 1));

        const mesh = new THREE.Mesh(geo, mats[n % mats.length]);
        mesh.matrix.fromArray(placed.flatTransformation);
        mesh.matrixAutoUpdate = false;
        group.add(mesh); n++;
        geomData.delete();
      }
    });

    ifcAPI.CloseModel(modelID);
    if (n === 0) throw new Error('El modelo no contiene geometría visible.');
    scene.add(group);

    prog(93, 'Ajustando cámara...', 'Calculando encuadre');
    const box  = new THREE.Box3().setFromObject(group);
    const ctr  = box.getCenter(new THREE.Vector3());
    const sz   = box.getSize(new THREE.Vector3());
    const dist = Math.max(sz.x, sz.y, sz.z) * 1.8;
    controls.setView(ctr, dist);

    prog(100, '¡Modelo cargado! (' + n + ' elementos)', '');
    clearTimeout(timer);
    setTimeout(() => {
      document.getElementById('overlay').style.display = 'none';
      document.getElementById('controls').style.display = 'flex';
      document.getElementById('bar2').style.display = 'flex';
    }, 400);

    let wire = false;
    document.getElementById('btn-r').onclick = () => controls.setView(ctr, dist);
    document.getElementById('btn-w').onclick = () => { wire = !wire; mats.forEach(m => { m.wireframe = wire; }); };

  } catch (e) { clearTimeout(timer); showErr(e.message || String(e)); }
})();
</script>
</body>
</html>
