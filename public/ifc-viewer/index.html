<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Visor IFC — Infrale 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #050d1a; color: #e2e8f0; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }
    #container { width: 100%; height: 100vh; position: relative; }
    canvas { display: block; width: 100% !important; height: 100% !important; }
    #overlay { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; background: #050d1a; z-index: 10; }
    .spinner { width: 36px; height: 36px; border: 3px solid #1e3a5f; border-top-color: #2563eb; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    #overlay p     { font-size: 14px; color: #94a3b8; }
    #overlay small { font-size: 12px; color: #475569; }
    .pb  { width: 220px; height: 3px; background: #1e3a5f; border-radius: 2px; overflow: hidden; }
    .pf  { height: 100%; background: #2563eb; border-radius: 2px; transition: width 0.5s ease; }
    #error-box { position: absolute; inset: 0; display: none; flex-direction: column; align-items: center; justify-content: center; gap: 14px; background: #050d1a; padding: 32px; text-align: center; }
    #error-box svg { width: 42px; height: 42px; color: #ef4444; }
    #error-box h3  { font-size: 15px; color: #ef4444; }
    #error-box p   { font-size: 12px; color: #64748b; max-width: 420px; line-height: 1.75; }
    #error-box button { background: #1e3a5f; border: 1px solid #2563eb55; color: #94a3b8; padding: 8px 20px; border-radius: 8px; font-size: 12px; cursor: pointer; margin-top: 4px; }
    #error-box button:hover { color: #e2e8f0; background: #0f2035; }
    #controls  { position: absolute; top: 12px; right: 12px; display: none; gap: 6px; }
    .ctrl { background: rgba(5,13,26,0.88); border: 1px solid #1e3a5f; color: #94a3b8; padding: 6px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .ctrl:hover { background: #0f2035; color: #e2e8f0; border-color: #2563eb; }
    #statusbar { position: absolute; bottom: 12px; left: 12px; display: none; align-items: center; gap: 8px; background: rgba(5,13,26,0.88); border: 1px solid #1e3a5f; border-radius: 8px; padding: 6px 12px; font-size: 12px; color: #94a3b8; pointer-events: none; }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: #2563eb; flex-shrink: 0; }
  </style>
</head>
<body>
<div id="container">
  <div id="overlay">
    <div class="spinner"></div>
    <p id="msg">Cargando visor...</p>
    <small id="sub">Iniciando Three.js</small>
    <div class="pb"><div class="pf" id="bar" style="width:0%"></div></div>
  </div>
  <div id="error-box">
    <svg fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
    </svg>
    <h3>Error al cargar el modelo</h3>
    <p id="err-msg"></p>
    <button onclick="location.reload()">↺ Reintentar</button>
  </div>
  <div id="controls">
    <button class="ctrl" id="btn-reset">⟳ Reset vista</button>
    <button class="ctrl" id="btn-wire">◻ Wireframe</button>
  </div>
  <div id="statusbar">
    <span class="dot"></span>
    <span id="model-label">Modelo IFC</span>
    <span style="color:#334155">·</span>
    <span style="color:#475569">Arrastra · Scroll zoom · Clic derecho pan</span>
  </div>
</div>

<!-- Three.js desde jsDelivr (confiable) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>
<!-- OrbitControls standalone (compatible con THREE global) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.149.0/examples/js/controls/OrbitControls.js"></script>
<!-- web-ifc WASM API servido localmente (sin dependencia de CDN externo) -->
<script src="/ifc-viewer/web-ifc-api-iife.js"></script>

<script>
(async function () {
  const params    = new URLSearchParams(location.search);
  const fileUrl   = params.get('url');
  const modelName = params.get('name') || 'Modelo IFC';

  const overlay  = document.getElementById('overlay');
  const errorBox = document.getElementById('error-box');

  function prog(pct, m, s) {
    document.getElementById('bar').style.width = pct + '%';
    if (m) document.getElementById('msg').textContent = m;
    if (s) document.getElementById('sub').textContent = s;
  }
  function showError(text) {
    overlay.style.display  = 'none';
    errorBox.style.display = 'flex';
    document.getElementById('err-msg').textContent = text;
  }

  if (!fileUrl) { showError('No se especificó la URL del modelo.'); return; }
  document.getElementById('model-label').textContent = modelName;

  // Validar que las librerías cargaron
  if (typeof THREE === 'undefined') { showError('Three.js no cargó. Verifica tu conexión.'); return; }
  if (typeof THREE.OrbitControls === 'undefined') { showError('OrbitControls no cargó. Verifica tu conexión.'); return; }
  if (typeof WebIFC === 'undefined') { showError('Motor IFC no cargó. Verifica tu conexión.'); return; }

  const timer = setTimeout(() =>
    showError('Tiempo de espera agotado (5 min). El modelo es muy grande o hay problemas de red.'),
    5 * 60 * 1000
  );

  try {
    prog(8, 'Iniciando visor 3D...', 'Configurando escena');

    // ── Escena Three.js ───────────────────────────────────────────────
    const scene    = new THREE.Scene();
    scene.background = new THREE.Color(0x050d1a);

    const cont     = document.getElementById('container');
    const camera   = new THREE.PerspectiveCamera(60, cont.clientWidth / cont.clientHeight, 0.01, 50000);
    camera.position.set(20, 20, 20);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(cont.clientWidth, cont.clientHeight);
    cont.appendChild(renderer.domElement);

    const controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    scene.add(new THREE.AmbientLight(0xffffff, 0.7));
    const sun = new THREE.DirectionalLight(0xffffff, 1.3);
    sun.position.set(50, 80, 50);
    scene.add(sun);
    scene.add(new THREE.GridHelper(500, 50, 0x1e3a5f, 0x0f2035));

    window.addEventListener('resize', () => {
      camera.aspect = cont.clientWidth / cont.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(cont.clientWidth, cont.clientHeight);
    });
    (function loop() { requestAnimationFrame(loop); controls.update(); renderer.render(scene, camera); })();

    // ── Descargar archivo IFC ─────────────────────────────────────────
    prog(18, 'Descargando modelo...', 'Conectando con el servidor');
    let res;
    try { res = await fetch(fileUrl); }
    catch (e) { throw new Error('Sin conexión al servidor. (' + e.message + ')'); }
    if (!res.ok) throw new Error('Error HTTP ' + res.status + ' al descargar el modelo.');

    prog(36, 'Descargando modelo...', 'Recibiendo datos');
    const buffer = await res.arrayBuffer();

    // ── Inicializar web-ifc WASM ──────────────────────────────────────
    prog(50, 'Inicializando motor IFC...', 'Cargando WASM local');
    const ifcAPI = new WebIFC.IfcAPI();
    ifcAPI.SetWasmPath('/ifc-viewer/');
    try { await ifcAPI.Init(); }
    catch (e) { throw new Error('Error al inicializar el motor IFC WASM. (' + e.message + ')'); }

    // ── Parsear IFC ───────────────────────────────────────────────────
    prog(62, 'Procesando geometría...', 'Parseando el archivo IFC');
    const data    = new Uint8Array(buffer);
    const modelID = ifcAPI.OpenModel(data, { COORDINATE_TO_ORIGIN: true, USE_FAST_BOOLS: true });

    prog(74, 'Construyendo mallas 3D...', 'Generando geometría Three.js');

    // Paleta de colores para los elementos
    const palette = [0x2563eb, 0x0ea5e9, 0x6366f1, 0x8b5cf6, 0x06b6d4,
                     0x3b82f6, 0x64748b, 0x94a3b8, 0x475569, 0x334155];
    const mats = palette.map(c => new THREE.MeshLambertMaterial({ color: c, side: THREE.DoubleSide }));

    const group = new THREE.Group();
    let meshCount = 0;

    ifcAPI.StreamAllMeshes(modelID, (flatMesh) => {
      const geomCount = flatMesh.geometries.size();
      for (let i = 0; i < geomCount; i++) {
        const placed = flatMesh.geometries.get(i);
        const geomData = ifcAPI.GetGeometry(modelID, placed.geometryExpressID);

        const verts    = ifcAPI.GetRawLineData(modelID, placed.geometryExpressID);
        const idxData  = ifcAPI.GetIndexArray(geomData.GetIndexData(), geomData.GetIndexDataSize());
        const vtxData  = ifcAPI.GetVertexArray(geomData.GetVertexData(), geomData.GetVertexDataSize());

        if (!vtxData || !idxData || vtxData.length === 0 || idxData.length === 0) continue;

        // vtxData: interleaved [x,y,z, nx,ny,nz, ...]
        const posArr = new Float32Array(vtxData.length / 2);
        const nrmArr = new Float32Array(vtxData.length / 2);
        for (let j = 0; j < vtxData.length; j += 6) {
          const k = j / 2;
          posArr[k]     = vtxData[j];     posArr[k + 1] = vtxData[j + 1]; posArr[k + 2] = vtxData[j + 2];
          nrmArr[k]     = vtxData[j + 3]; nrmArr[k + 1] = vtxData[j + 4]; nrmArr[k + 2] = vtxData[j + 5];
        }

        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
        geo.setAttribute('normal',   new THREE.BufferAttribute(nrmArr, 3));
        geo.setIndex(new THREE.BufferAttribute(idxData, 1));

        const m    = new THREE.Matrix4().fromArray(placed.flatTransformation);
        const mesh = new THREE.Mesh(geo, mats[meshCount % mats.length]);
        mesh.matrix.copy(m);
        mesh.matrixAutoUpdate = false;

        group.add(mesh);
        meshCount++;

        geomData.delete();
      }
    });

    ifcAPI.CloseModel(modelID);

    if (meshCount === 0) throw new Error('El modelo IFC no contiene geometría visible.');

    scene.add(group);

    // ── Centrar cámara ────────────────────────────────────────────────
    prog(93, 'Ajustando cámara...', 'Calculando encuadre');
    const box    = new THREE.Box3().setFromObject(group);
    const center = box.getCenter(new THREE.Vector3());
    const size   = box.getSize(new THREE.Vector3());
    const dist   = Math.max(size.x, size.y, size.z) * 1.8;
    controls.target.copy(center);
    camera.position.set(center.x + dist, center.y + dist * 0.6, center.z + dist);
    controls.update();

    prog(100, '¡Modelo cargado! (' + meshCount + ' elementos)', '');
    clearTimeout(timer);

    setTimeout(() => {
      overlay.style.display = 'none';
      document.getElementById('controls').style.display  = 'flex';
      document.getElementById('statusbar').style.display = 'flex';
    }, 400);

    // ── Botones ───────────────────────────────────────────────────────
    let wireframe = false;
    document.getElementById('btn-reset').onclick = () => {
      controls.target.copy(center);
      camera.position.set(center.x + dist, center.y + dist * 0.6, center.z + dist);
      controls.update();
    };
    document.getElementById('btn-wire').onclick = () => {
      wireframe = !wireframe;
      mats.forEach(m => { m.wireframe = wireframe; });
    };

  } catch (err) {
    clearTimeout(timer);
    showError(err.message || String(err));
  }
})();
</script>
</body>
</html>
